<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBZ Esport</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b0b0f;
  color:white;
}

header{
  padding:60px 20px;
  text-align:center;
  background: radial-gradient(circle at top,#1a1a1a,#000);
  border-bottom:2px solid #ff7a00;
}

header h1{
  font-size:60px;
  margin:0;
  color:#ff7a00;
}

header p{color:#bbb;}

nav a{
  color:white;
  margin:10px;
  text-decoration:none;
  font-weight:bold;
}

nav a:hover{color:#ff7a00;}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 25px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  background:linear-gradient(90deg,#ff7a00,#ff3c00);
  color:black;
}

section{
  padding:60px 20px;
  text-align:center;
}

.card{
  background:#15151b;
  padding:20px;
  margin:auto;
  max-width:600px;
  border-radius:12px;
  border:1px solid #222;
}

input,select,textarea{
  width:90%;
  max-width:400px;
  padding:10px;
  margin:8px;
  border-radius:8px;
  border:none;
  text-align:center;
}

textarea{height:100px;}

button{
  padding:12px 30px;
  background:linear-gradient(90deg,#ff7a00,#ff3c00);
  border:none;
  color:black;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

footer{
  text-align:center;
  padding:20px;
  color:#666;
}
  /* CENTRAGE FORMULAIRE PRO */
form{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

/* améliore les champs */
input, select, textarea{
  background:#111;
  color:white;
  border:1px solid #222;
  outline:none;
}

/* placeholder visible */
input::placeholder,
textarea::placeholder{
  color:#aaa;
}

/* focus propre */
input:focus,
select:focus,
textarea:focus{
  border:1px solid #ff7a00;
  box-shadow:0 0 10px rgba(255,122,0,0.3);
}
</style>
</head>

<body>

<header>
  <h1>🦇 XBZ ESPORT</h1>
  <p>Structure compétitive en développement</p>

  <nav>
    <a href="#accueil">Accueil</a>
    <a href="#equipes">Équipes</a>
    <a href="#recrutement">Recrutement</a>
    <a href="#support">Support</a>
  </nav>

  <a class="btn" href="https://discord.gg/w7s3rBPsZ6" target="_blank">Discord</a>
</header>

<section id="accueil">
  <div class="card">
    <h2>Bienvenue sur XBZ</h2>
    <p>Team esport en développement 🚀</p>
  </div>
</section>

<section id="equipes">
  <div class="card">
    <h2>Équipes</h2>
    <p>Rocket League / Warzone</p>
  </div>
</section>

<section id="recrutement">
  <div class="card">

    <h2>📝 Recrutement</h2>

    <form id="form">

      <input type="text" placeholder="Nom + Prénom" required>
      <input type="number" placeholder="Âge" required>

      <input type="text" placeholder="Pays résidence" required>
      <input type="text" placeholder="Pays naissance" required>

      <input type="text" placeholder="Discord" required>
      <input type="text" placeholder="Pseudo jeu" required>

      <select required>
        <option value="">Jeu</option>
        <option>Rocket League</option>
        <option>Warzone</option>
      </select>

      <input type="text" placeholder="Rang">
      <textarea placeholder="Expérience"></textarea>
      <textarea textarea{
  height:70px; 
  resize:none;
placeholder="Motivation"></textarea>

      <button type="submit">Envoyer</button>
    </form>

    <p id="cooldown" style="color:#ff7a00;margin-top:10px;"></p>

  </div>
</section>

<section id="support">
  <div class="card">
    <h2>Support</h2>
    <a class="btn" href="mailto:xbzesport1@gmail.com">Mail</a>
    <a class="btn" href="https://discord.gg/w7s3rBPsZ6">Discord</a>
  </div>
</section>

<footer>
© XBZ Esport
</footer>

<script>

window.addEventListener("DOMContentLoaded", ()=>{

  const form = document.querySelector("#form");
  const cd = document.getElementById("cooldown");

  function update(){
    const t = timeLeft();
    cd.innerText = t>0
      ? "⛔ Repostule dans " + format(t)
      : "🟢 Recrutement ouvert";
  }

  setInterval(update,1000);
  update();

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    if(timeLeft()>0){
      alert("⛔ Attends avant de repostuler !");
      return;
    }

    const data = {
      nom: form[0].value,
      age: form[1].value,
      pays1: form[2].value,
      pays2: form[3].value,
      discord: form[4].value,
      pseudo: form[5].value,
      jeu: form[6].value,
      rang: form[7].value,
      exp: form[8].value,
      motiv: form[9].value
    };

    try {
      const res = await fetch("https://xbz-bot.onrender.com/recrutement", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      if(res.ok)
        alert("✅ Candidature envoyée !");
        form.reset();
        update();
      } else {
        alert("❌ Erreur serveur");
      }

    } catch (err) {
      console.error(err);
      alert("❌ Erreur de connexion");
    }
  });

});
</script>

</body>
</html>
