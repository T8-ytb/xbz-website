<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBZ Esport</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0f0f18, #050509);
  color: white;
  overflow-x: hidden;
}

/* NAV FLOAT */
nav {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 18px 40px;
  display: flex;
  justify-content: center;
  gap: 25px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  z-index: 1000;
}

nav a {
  color: #aaa;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
  letter-spacing: 1px;
}

nav a:hover {
  color: #ff7a00;
}

/* HERO FULL SCREEN */
header {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  background: radial-gradient(circle at top, #1a1a1a, #000);
}

header h1 {
  font-size: 90px;
  margin: 0;
  color: #ff7a00;
  text-shadow: 0 0 40px rgba(255,122,0,0.3);
}

header p {
  color: #aaa;
  font-size: 18px;
  margin-top: 10px;
  letter-spacing: 2px;
}

/* CTA BUTTON */
.btn {
  margin-top: 25px;
  padding: 14px 30px;
  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  color: black;
  font-weight: bold;
  border-radius: 12px;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 30px rgba(255,122,0,0.4);
}

/* SECTIONS STYLE G2 */
section {
  padding: 120px 10%;
}

.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,122,0,0.15);
  border-radius: 18px;
  padding: 40px;
  backdrop-filter: blur(12px);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border: 1px solid rgba(255,122,0,0.4);
}

/* TITRES */
h2 {
  font-size: 40px;
  margin-bottom: 20px;
}

/* FORM STYLE PREMIUM */
input, select, textarea {
  width: 100%;
  max-width: 500px;
  padding: 14px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

input:focus, textarea:focus, select:focus {
  outline: 1px solid #ff7a00;
}

/* FOOTER CLEAN */
footer {
  text-align: center;
  padding: 40px;
  color: #666;
}
</style>
</head>

<body>

<header>
  <h1>🦇 XBZ ESPORT</h1>
  <p>Structure compétitive en développement</p>

  <nav>
    <a href="#accueil">Accueil</a>
    <a href="#equipes">Équipes</a>
    <a href="#recrutement">Recrutement</a>
    <a href="#support">Support</a>
  </nav>

  <a class="btn" href="https://discord.gg/w7s3rBPsZ6" target="_blank">Rejoindre Discord</a>
</header>

<section id="accueil">
  <div class="card">
    <h2>Bienvenue sur XBZ</h2>
    <p>Une structure esport en pleine évolution 🚀</p>
  </div>
</section>

<section id="equipes">
  <div class="card">
    <h2>Nos équipes</h2>
    <p>Rocket League • Warzone • Future expansions</p>
  </div>
</section>

<section id="recrutement">
  <div class="card">

    <h2>📝 Recrutement</h2>

    <form id="form">

      <input type="text" placeholder="Nom + Prénom" required>
      <input type="number" placeholder="Âge" required>

      <input type="text" placeholder="Pays résidence" required>
      <input type="text" placeholder="Pays naissance" required>

      <input type="text" placeholder="Discord" required>
      <input type="text" placeholder="Pseudo jeu" required>

      <select id="jeuSelect" required>
        <option value="">Jeu</option>
        <option value="Rocket League">Rocket League</option>
        <option value="Warzone">Warzone</option>
      </select>

      <!-- RL TRACKER -->
      <input
        type="text"
        id="rltracker"
        placeholder="Lien RL Tracker (Rocket League uniquement)"
        style="display:none;"
      >

    </form>

  </div>
</section>

      <input type="text" placeholder="Rang">

      <textarea placeholder="Expérience"></textarea>
      <textarea placeholder="Motivation"></textarea>

      <button type="submit">Envoyer candidature</button>
    </form>

    <p id="status"></p>

  </div>
</section>

<section id="support">
  <div class="card">
    <h2>Support</h2>
    <a class="btn" href="mailto:xbzesport1@gmail.com">Mail</a>
    <a class="btn" href="https://discord.gg/w7s3rBPsZ6">Discord</a>
  </div>
</section>

<footer>
© XBZ Esport
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const form = document.querySelector("#form");
  const status = document.getElementById("status");
  const jeuSelect = document.getElementById("jeuSelect");
  const rlField = document.getElementById("rltracker");

  // =========================
  // AFFICHAGE RL TRACKER
  // =========================
  jeuSelect.addEventListener("change", () => {
  if (jeuSelect.value === "Rocket League") {
    rlField.style.display = "block";
  } else {
    rlField.style.display = "none";
    rlField.value = "";
  }
});

  // =========================
  // ENVOI FORMULAIRE
  // =========================
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    status.innerText = "⏳ Envoi en cours...";
    status.style.color = "#ffb347";

    const data = {
      nom: form[0].value,
      age: form[1].value,
      pays1: form[2].value,
      pays2: form[3].value,
      discord: form[4].value,
      pseudo: form[5].value,
      jeu: form[6].value,
      rang: form[7].value,
      exp: form[8].value,
      motiv: form[9].value,
      rltracker: rlField.value || ""
    };

    try {
      const res = await fetch("https://xbz-bot.onrender.com/recrutement", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      if (!res.ok) {
        status.innerText = "❌ Erreur serveur";
        status.style.color = "red";
        return;
      }

      status.innerText = "✅ Candidature envoyée avec succès !";
      status.style.color = "#00ff88";

      form.reset();
      rlField.style.display = "none";

    } catch (err) {
      status.innerText = "❌ Erreur de connexion API";
      status.style.color = "red";
    }
  });

});
</script>

</body>
</html>
