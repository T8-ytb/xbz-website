<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>XBZ Esport</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  color:white;
  text-align:center;
}

header{
  padding:30px;
  border-bottom:2px solid #ff7a00;
}

h1{
  color:#ff7a00;
  font-size:60px;
  margin:0;
}

p{
  color:#ccc;
}

nav{
  margin-top:15px;
}

nav a{
  color:white;
  text-decoration:none;
  margin:15px;
  font-weight:bold;
}

nav a:hover{
  color:#ff7a00;
}

section{
  padding:80px 20px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* DISCORD BUTTON */
.discord-btn{
  display:inline-block;
  margin-top:20px;
  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  color:black;
  padding:15px 35px;
  border-radius:12px;
  font-weight:bold;
  text-decoration:none;
  box-shadow:0 0 20px rgba(255,122,0,0.4);
  transition:0.3s;
}

.discord-btn:hover{
  transform:scale(1.08);
  box-shadow:0 0 35px rgba(255,122,0,0.7);
}

/* FORM */
form{
  display:flex;
  flex-direction:column;
  align-items:center;
}

input, select, textarea{
  width:80%;
  max-width:400px;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:none;
  text-align:center;
}

textarea{
  height:100px;
}

form button{
  background:linear-gradient(90deg,#ff7a00,#ff3c00);
  border:none;
  padding:15px 40px;
  font-size:18px;
  border-radius:12px;
  cursor:pointer;
  color:black;
  font-weight:bold;
  transition:0.3s;
  box-shadow:0 0 20px rgba(255,122,0,0.3);
}

form button:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px rgba(255,122,0,0.6);
}

input[placeholder*="Tracker"]{
  display:none;
}
</style>

</head>

<body>

<header id="accueil">

<h1>🦇 XBZ ESPORT</h1>
<p>Structure compétitive en développement</p>

<nav>
  <a href="#accueil">Accueil</a>
  <a href="#equipes">Équipes</a>
  <a href="#recrutement">Recrutement</a>
  <a href="#contact">Contact</a>
</nav>

<a class="discord-btn" href="https://discord.gg/w7s3rBPsZ6" target="_blank">
  🔥 Rejoindre Discord
</a>

</header>

<section>
<h2>Rejoins XBZ Esport</h2>
<p>Nous sommes actifs sur Rocket League et Warzone</p>
</section>

<section id="equipes">
<h2>Équipes XBZ</h2>
<ul style="list-style:none;padding:0;">
  <li>🚗 Rocket League</li>
  <li>🔫 Warzone</li>
</ul>
</section>

<section id="recrutement">

<h2>Recrutement XBZ</h2>

<form>

<input type="text" placeholder="Pseudo" required>
<input type="number" placeholder="Âge" required>
<input type="text" placeholder="Discord (ex: pseudo#1234)" required>

<select required>
  <option>Choisis ton jeu</option>
  <option>Rocket League</option>
  <option>Warzone</option>
</select>

<input type="text" placeholder="Rang / Niveau">
<input type="text" placeholder="Lien Rocket League Tracker (si RL)">
<textarea placeholder="Pourquoi veux-tu rejoindre XBZ ?"></textarea>

<button type="submit">Envoyer ma candidature</button>

</form>

</section>

<section id="contact">
<h2>Contact</h2>
<a class="discord-btn" href="https://discord.gg/w7s3rBPsZ6" target="_blank">
  💬 Ouvrir Discord
</a>
</section>

<script>
const form = document.querySelector("form");
const gameSelect = document.querySelector("select");
const rlInput = document.querySelector("input[placeholder*='Tracker']");

function checkGame(){
  if(gameSelect.value === "Rocket League"){
    rlInput.style.display = "block";
  } else {
    rlInput.style.display = "none";
    rlInput.value = "";
  }
}

gameSelect.addEventListener("change", checkGame);
checkGame();

function generateID(){
  return "XBZ-" + Math.floor(Math.random() * 99999);
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const id = generateID();

  const pseudo = form[0].value;
  const age = form[1].value;
  const discord = form[2].value;
  const jeu = form[3].value;
  const rang = form[4].value;
  const tracker = form[5].value;
  const motivation = form[6].value;

  const embed = {
    username: "XBZ Recrutement",
    embeds: [{
      title: "🦇 Nouvelle candidature XBZ",
      color: 16744192,
      fields: [
        { name: "🆔 ID", value: id, inline: false },
        { name: "Pseudo", value: pseudo, inline: true },
        { name: "Âge", value: age, inline: true },
        { name: "Discord", value: discord, inline: false },
        { name: "Jeu", value: jeu, inline: true },
        { name: "Rang", value: rang || "Non précisé", inline: true },
        { name: "Tracker RL", value: tracker || "N/A", inline: false },
        { name: "Motivation", value: motivation }
      ],
      footer: {
        text: "XBZ Esport - système recrutement"
      }
    }]
  };

  await fetch("https://discord.com/api/webhooks/1522305032609988692/Eb0c4kgWD05zYVguRHR8Uc0HKSxsr6WFkscTOV1UEfKnmeIYH_Un75Vj2w2vz9pXIgwG", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(embed)
  });

  alert("Candidature envoyée !");
  form.reset();
  checkGame();
});
</script>
</body>
</html>
