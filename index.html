<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XBZ Esport</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0a0a0f;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 80px 20px;
  background: radial-gradient(circle at top, #1a1a1a, #000);
  border-bottom: 2px solid #ff7a00;
}

header h1 {
  font-size: 55px;
  margin: 0;
  color: #ff7a00;
  letter-spacing: 2px;
}

header p {
  color: #aaa;
  margin-top: 10px;
}

/* NAV */
nav {
  margin-top: 20px;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 15px;
  font-weight: bold;
}

nav a:hover {
  color: #ff7a00;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 25px;
  border-radius: 10px;
  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  color: black;
  font-weight: bold;
  text-decoration: none;
}

/* SECTIONS */
section {
  padding: 70px 20px;
  text-align: center;
}

.card {
  background: #15151b;
  padding: 25px;
  border-radius: 12px;
  max-width: 700px;
  margin: auto;
  border: 1px solid #222;
}

/* FORM */
form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

input, select, textarea {
  width: 90%;
  max-width: 400px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #222;
  background: #111;
  color: white;
  outline: none;
}

input:focus, textarea:focus, select:focus {
  border: 1px solid #ff7a00;
  box-shadow: 0 0 10px rgba(255, 122, 0, 0.3);
}

textarea {
  height: 100px;
  resize: none;
}

button {
  padding: 12px 30px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(90deg, #ff7a00, #ff3c00);
  color: black;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  transform: scale(1.05);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #666;
  margin-top: 30px;
}
</style>
</head>

<body>

<header>
  <h1>🦇 XBZ ESPORT</h1>
  <p>Structure compétitive en développement</p>

  <nav>
    <a href="#accueil">Accueil</a>
    <a href="#equipes">Équipes</a>
    <a href="#recrutement">Recrutement</a>
    <a href="#support">Support</a>
  </nav>

  <a class="btn" href="https://discord.gg/w7s3rBPsZ6" target="_blank">Rejoindre Discord</a>
</header>

<section id="accueil">
  <div class="card">
    <h2>Bienvenue sur XBZ</h2>
    <p>Une structure esport en pleine évolution 🚀</p>
  </div>
</section>

<section id="equipes">
  <div class="card">
    <h2>Nos équipes</h2>
    <p>Rocket League • Warzone • Future expansions</p>
  </div>
</section>

<section id="recrutement">
  <div class="card">

    <h2>📝 Recrutement</h2>

    <form id="form">

      <input type="text" placeholder="Nom + Prénom" required>
      <input type="number" placeholder="Âge" required>

      <input type="text" placeholder="Pays résidence" required>
      <input type="text" placeholder="Pays naissance" required>

      <input type="text" placeholder="Discord" required>
      <input type="text" placeholder="Pseudo jeu" required>

      <select required>
        <option value="">Jeu</option>
        <option>Rocket League</option>
        <option>Warzone</option>
				<input type="text" id="rltracker" placeholder="Lien RL Tracker (Rocket League uniquement)" style="display:none;">
      </select>

      <input type="text" placeholder="Rang">

      <textarea placeholder="Expérience"></textarea>
      <textarea placeholder="Motivation"></textarea>

      <button type="submit">Envoyer candidature</button>
    </form>

    <p id="status"></p>

  </div>
</section>

<section id="support">
  <div class="card">
    <h2>Support</h2>
    <a class="btn" href="mailto:xbzesport1@gmail.com">Mail</a>
    <a class="btn" href="https://discord.gg/w7s3rBPsZ6">Discord</a>
  </div>
</section>

<footer>
© XBZ Esport
</footer>

<script>
document.querySelector("#form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
const jeuSelect = document.querySelector("select");
const rlField = document.getElementById("rltracker");

jeuSelect.addEventListener("change", () => {
  if (jeuSelect.value === "Rocket League") {
    rlField.style.display = "block";
    rlField.required = true;
  } else {
    rlField.style.display = "none";
    rlField.required = false;
    rlField.value = "";
  }
});
  const data = {
    nom: form[0].value,
    age: form[1].value,
    pays1: form[2].value,
    pays2: form[3].value,
    discord: form[4].value,
    pseudo: form[5].value,
    jeu: form[6].value,
    rang: form[7].value,
    exp: form[8].value,
    motiv: form[9].value
		rltracker: rlField.value || ""
  };

  document.getElementById("status").innerText = "⏳ Envoi...";

  try {
    const res = await fetch("https://xbz-bot.onrender.com/recrutement", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (!res.ok) {
      document.getElementById("status").innerText = "❌ Erreur serveur";
      return;
    }

    document.getElementById("status").innerText = "✅ Envoyé avec succès !";
    form.reset();

  } catch (err) {
    document.getElementById("status").innerText = "❌ Erreur connexion API";
  }
});
</script>

</body>
</html>
